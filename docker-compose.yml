services:
  db:
    image: mysql:8.0
    container_name: zamoritos_db
    environment:
      MYSQL_DATABASE: zamoritos
      MYSQL_USER: zamoritos
      MYSQL_PASSWORD: zamoritos_secret
      MYSQL_ROOT_PASSWORD: root_secret
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "zamoritos", "-pzamoritos_secret"]
      timeout: 10s
      retries: 10
      interval: 5s
    networks:
      - zamoritos

  backend:
    build: ./backend
    container_name: zamoritos_backend
    volumes:
      - ./backend:/var/www/html
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: zamoritos
      DB_USERNAME: zamoritos
      DB_PASSWORD: zamoritos_secret
    depends_on:
      db:
        condition: service_healthy
    networks:
      - zamoritos

  frontend:
    build: ./frontend
    container_name: zamoritos_frontend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    networks:
      - zamoritos

networks:
  zamoritos:
    driver: bridge

volumes:
  db_data:
  frontend_node_modules:
  frontend_next:
