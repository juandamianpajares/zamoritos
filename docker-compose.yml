services:

  # ── Base de datos ────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: zamoritos_db
    environment:
      MYSQL_DATABASE: zamoritos
      MYSQL_USER: zamoritos
      MYSQL_PASSWORD: zamoritos_secret
      MYSQL_ROOT_PASSWORD: root_secret
    volumes:
      - db_data:/var/lib/mysql
    # Puerto expuesto solo para acceso directo (MySQL Workbench, etc.)
    # Comentar en producción real
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "zamoritos", "-pzamoritos_secret"]
      timeout: 10s
      retries: 10
      interval: 5s
    networks:
      - zamoritos

  # ── Backend Laravel (PHP-FPM) ────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: zamoritos_backend
    volumes:
      - ./backend:/var/www/html
      - ./imagenes-entrada:/var/imagenes   # carpeta donde el cliente deposita {codigo}.webp
    # Puerto directo para debug/acceso sin nginx. Comentar si no se necesita.
    # ports:
    #   - "9000:9000"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://zs.sytes.net
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: zamoritos
      DB_USERNAME: zamoritos
      DB_PASSWORD: zamoritos_secret
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # Verifica que Laravel está instalado y PHP funciona
      test: ["CMD-SHELL", "php -r \"require '/var/www/html/vendor/autoload.php'; echo 'ok';\" 2>/dev/null | grep -q ok"]
      interval: 10s
      timeout: 15s
      retries: 30
      start_period: 180s
    networks:
      - zamoritos

  # ── Frontend Next.js (producción) ───────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: zamoritos_frontend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    # Puerto directo para debug. Comentar si no se necesita.
    # ports:
    #   - "3000:3000"
    environment:
      # URL relativa → nginx proxy /api/* al backend. Funciona desde cualquier IP/dominio.
      NEXT_PUBLIC_API_URL: /api
      NODE_ENV: production
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 240s
    networks:
      - zamoritos

  # ── Nginx (entrada única: puerto 80) ────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: zamoritos_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Acceso a archivos estáticos de Laravel (storage, public/)
      - ./backend:/var/www/html:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - zamoritos

  # ── Cloudflare Tunnel (opcional - descomentar si se prefiere tunnel sobre port forwarding)
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   container_name: zamoritos_tunnel
  #   command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
  #   depends_on:
  #     - nginx
  #   networks:
  #     - zamoritos
  #   restart: unless-stopped

networks:
  zamoritos:
    driver: bridge

volumes:
  db_data:
  frontend_node_modules:
  frontend_next:
